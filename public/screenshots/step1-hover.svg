<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1e3a5f;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow1" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.15"/>
    </filter>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#6366f1" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background - fake browser -->
  <rect width="800" height="500" fill="#f1f5f9"/>
  
  <!-- Browser chrome bar -->
  <rect y="0" width="800" height="36" fill="#cbd5e1" rx="0"/>
  <circle cx="18" cy="18" r="6" fill="#ef4444"/>
  <circle cx="32" cy="18" r="6" fill="#eab308"/>
  <circle cx="46" cy="18" r="6" fill="#22c55e"/>
  <rect x="62" y="6" width="680" height="24" fill="white" rx="4"/>
  <text x="72" y="22" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">🔒  https://example.com</text>
  
  <!-- Page content area -->
  <rect y="36" width="800" height="464" fill="#f8fafc"/>
  
  <!-- Hero section (fake webpage content) -->
  <rect x="40" y="60" width="720" height="160" fill="url(#grad1)" rx="12"/>
  <rect x="70" y="80" width="120" height="18" fill="rgba(99,102,241,0.2)" rx="9"/>
  <text x="80" y="93" font-family="system-ui,sans-serif" font-size="10" fill="#a5b4fc" font-weight="600">AI-Powered CSS Extraction</text>
  <text x="70" y="120" font-family="system-ui,sans-serif" font-size="18" fill="white" font-weight="800">Extract Any Style.</text>
  <text x="70" y="142" font-family="system-ui,sans-serif" font-size="18" fill="white" font-weight="800">Export Any Code.</text>
  <text x="70" y="165" font-family="system-ui,sans-serif" font-size="10" fill="#94a3b8">Hover → Extract → Edit → Export.</text>
  <rect x="70" y="175" width="140" height="30" fill="url(#grad2)" rx="6"/>
  <text x="90" y="195" font-family="system-ui,sans-serif" font-size="10" fill="white" font-weight="600">Get StyleSnap — $29</text>
  
  <!-- HIGHLIGHT BOX - THE KEY VISUAL (blue border around button) -->
  <rect x="70" y="175" width="140" height="30" fill="none" stroke="#6366f1" stroke-width="3" rx="6" filter="url(#shadow2)"/>
  <rect x="70" y="175" width="140" height="30" fill="rgba(99,102,241,0.08)"/>
  
  <!-- Hover tooltip -->
  <rect x="70" y="140" width="220" height="85" fill="#1e293b" rx="6" filter="url(#shadow1)"/>
  <polygon points="82,140 92,134 102,140" fill="#1e293b"/>
  <text x="82" y="156" font-family="system-ui,sans-serif" font-size="10" fill="#a5b4fc" font-weight="600">⟨/⟩  .demo-btn</text>
  <text x="82" y="172" font-family="system-ui,sans-serif" font-size="9" fill="#64748b">background</text>
  <text x="155" y="172" font-family="system-ui,sans-serif" font-size="9" fill="#a5b4fc" font-weight="600">linear-gradient(...)</text>
  <text x="82" y="186" font-family="system-ui,sans-serif" font-size="9" fill="#64748b">padding</text>
  <text x="155" y="186" font-family="system-ui,sans-serif" font-size="9" fill="#a5b4fc" font-weight="600">10px 28px</text>
  <text x="82" y="200" font-family="system-ui,sans-serif" font-size="9" fill="#64748b">border-radius</text>
  <text x="155" y="200" font-family="system-ui,sans-serif" font-size="9" fill="#a5b4fc" font-weight="600">8px</text>
  
  <!-- Cards below -->
  <rect x="40" y="240" width="340" height="100" fill="white" rx="10" filter="url(#shadow1)"/>
  <text x="60" y="262" font-family="system-ui,sans-serif" font-size="12" fill="#1e293b" font-weight="700">Pixel-Perfect Extraction</text>
  <text x="60" y="280" font-family="system-ui,sans-serif" font-size="9" fill="#64748b">Hover over any element to instantly</text>
  <text x="60" y="292" font-family="system-ui,sans-serif" font-size="9" fill="#64748b">capture its computed styles.</text>
  
  <rect x="420" y="240" width="340" height="100" fill="white" rx="10" filter="url(#shadow1)"/>
  <text x="440" y="262" font-family="system-ui,sans-serif" font-size="12" fill="#1e293b" font-weight="700">AI Code Generation</text>
  <text x="440" y="280" font-family="system-ui,sans-serif" font-size="9" fill="#64748b">One click converts CSS to React,</text>
  <text x="440" y="292" font-family="system-ui,sans-serif" font-size="9" fill="#64748b">Vue, or Tailwind classes.</text>
  
  <!-- Step label at bottom -->
  <rect x="200" y="430" width="400" height="44" fill="#6366f1" rx="8" filter="url(#shadow1)"/>
  <circle cx="230" cy="452" r="12" fill="rgba(255,255,255,0.2)"/>
  <text x="245" y="457" font-family="system-ui,sans-serif" font-size="14" fill="white" font-weight="700">01  Hover &amp; Select — Move cursor to any element</text>
</svg>