  <rect x="570" y="525" width="140" height="24" fill="none" stroke="#334155" stroke-width="1" rx="6"/>
  <text x="600" y="540" font-family="system-ui,sans-serif" font-size="9" fill="#a5b4fc" font-weight="600">⤓  Download .tsx</text>
  <rect x="720" y="525" width="80" height="24" fill="#6366f1" rx="6"/>
  <text x="740" y="540" font-family="system-ui,sans-serif" font-size="9" fill="white" font-weight="600">⎘  Copy</text>
  
  <!-- Step label -->
  <rect x="100" y="510" width="360" height="34" fill="#6366f1" rx="8" filter="url(#shadow2)"/>
  <circle cx="120" cy="527" r="10" fill="rgba(255,255,255,0.2)"/>
  <text x="132" y="530" font-family="system-ui,sans-serif" font-size="11" fill="white" font-weight="700">03</text>
  <text x="158" y="530" font-family="system-ui,sans-serif" font-size="11" fill="white" font-weight="700">Export &amp; Ship — Choose format, copy or download code</text>
</svg>