      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1e3a5f;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow1" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="shadow2" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="560" fill="#1e293b"/>
  
  <!-- Browser chrome bar -->
  <rect y="0" width="900" height="36" fill="#cbd5e1" rx="0"/>
  <circle cx="18" cy="18" r="6" fill="#ef4444"/>
  <circle cx="32" cy="18" r="6" fill="#eab308"/>
  <circle cx="46" cy="18" r="6" fill="#22c55e"/>
  <rect x="62" y="6" width="680" height="24" fill="white" rx="4"/>
