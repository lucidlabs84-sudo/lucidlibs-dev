  <text x="88" y="103" font-family="system-ui,sans-serif" font-size="7" fill="#a5b4fc" font-weight="600">AI-Powered CSS Extraction</text>
  <text x="78" y="126" font-family="system-ui,sans-serif" font-size="15" fill="white" font-weight="800">Extract Any Style.</text>
  <text x="78" y="144" font-family="system-ui,sans-serif" font-size="15" fill="white" font-weight="800">Export Any Code.</text>
  <text x="78" y="163" font-family="system-ui,sans-serif" font-size="8" fill="#94a3b8">Hover → Extract → Edit → Export.</text>
  <rect x="78" y="171" width="110" height="24" fill="url(#grad2)" rx="6"/>
  <text x="90" y="186" font-family="system-ui,sans-serif" font-size="8" fill="white" font-weight="600">Get StyleSnap — $29</text>
  
  <!-- Cards below hero -->
  <rect x="60" y="256" width="200" height="80" fill="white" rx="8" filter="url(#shadow1)"/>
  <text x="76" y="278" font-family="system-ui,sans-serif" font-size="9" fill="#1e293b" font-weight="700">Pixel-Perfect Extraction</text>
  <text x="76" y="292" font-family="system-ui,sans-serif" font-size="7" fill="#64748b">Hover over any element to</text>
  <text x="76" y="302" font-family="system-ui,sans-serif" font-size="7" fill="#64748b">instantly capture styles.</text>
  <rect x="280" y="256" width="200" height="80" fill="white" rx="8" filter="url(#shadow1)"/>
  <text x="296" y="278" font-family="system-ui,sans-serif" font-size="9" fill="#1e293b" font-weight="700">AI Code Generation</text>
  <text x="296" y="292" font-family="system-ui,sans-serif" font-size="7" fill="#64748b">One click converts CSS to</text>
  <text x="296" y="302" font-family="system-ui,sans-serif" font-size="7" fill="#64748b">React, Vue, or Tailwind.</text>
  
