  <line x1="560" y1="102" x2="900" y2="102" stroke="#1e293b" stroke-width="1"/>
  
  <!-- Code block area -->
  <rect x="570" y="112" width="320" height="300" fill="#0a0f1a" rx="8" stroke="#1e293b" stroke-width="1"/>
  
  <!-- Code content (syntax highlighted) -->
  <text x="582" y="132" font-family="'SF Mono',Menlo,monospace" font-size="8" fill="#c084fc">import</text>
  <text x="618" y="132" font-family="'SF Mono',Menlo,monospace" font-size="8" fill="#e2e8f0"> styled </text>
  <text x="670" y="132" font-family="'SF Mono',Menlo,monospace" font-size="8" fill="#c084fc">from</text>
  <text x="702" y="132" font-family="'SF Mono',Menlo,monospace" font-size="8" fill="#fbbf24">'styled-components'</text>
  <text x="582" y="148" font-family="'SF Mono',Menlo,monospace" font-size="8" fill="#a5b4fc">;</text>
  
  <text x="582" y="168" font-family="'SF Mono',Menlo,monospace" font-size="8" fill="#c084fc">const</text>
  <text x="614" y="168" font-family="'SF Mono',Menlo,monospace" font-size="8" fill="#38bdf8"> HeroButton</text>
  <text x="698" y="168" font-family="'SF Mono',Menlo,monospace" font-size="8" fill="#e2e8f0"> = styled.</text>
  <text x="750" y="168" font-family="'SF Mono',Menlo,monospace" font-size="8" fill="#38bdf8">button</text>
  <text x="798" y="168" font-family="'SF Mono',Menlo,monospace" font-size="8" fill="#94a3b8">`</text>
  
  <text x="598" y="186" font-family="'SF Mono',Menlo,monospace" font-size="8" fill="#60a5fa">  background</text>
  <text x="670" y="186" font-family="'SF Mono',Menlo,monospace" font-size="8" fill="#e2e8f0">: </text>
  <text x="682" y="186" font-family="'SF Mono',Menlo,monospace" font-size="8" fill="#f472b6">${"${''}"}linear-gradient(135deg, #6366f1, #8b5cf6)${"${''}"}</text>
  <text x="598" y="202" font-family="'SF Mono',Menlo,monospace" font-size="8" fill="#60a5fa">  color</text>
  <text x="670" y="202" font-family="'SF Mono',Menlo,monospace" font-size="8" fill="#e2e8f0">: </text>
  <text x="682" y="202" font-family="'SF Mono',Menlo,monospace" font-size="8" fill="#34d399">#ffffff</text>
  <text x="598" y="218" font-family="'SF Mono',Menlo,monospace" font-size="8" fill="#60a5fa">  padding</text>
  <text x="670" y="218" font-family="'SF Mono',Menlo,monospace" font-size="8" fill="#e2e8f0">: </text>
  <text x="682" y="218" font-family="'SF Mono',Menlo,monospace" font-size="8" fill="#34d399">10px 28px</text>
  <text x="598" y="234" font-family="'SF Mono',Menlo,monospace" font-size="8" fill="#60a5fa">  border-radius</text>
  <text x="710" y="234" font-family="'SF Mono',Menlo,monospace" font-size="8" fill="#e2e8f0">: </text>
  <text x="722" y="234" font-family="'SF Mono',Menlo,monospace" font-size="8" fill="#34d399">8px</text>
  <text x="598" y="250" font-family="'SF Mono',Menlo,monospace" font-size="8" fill="#60a5fa">  font-weight</text>
  <text x="694" y="250" font-family="'SF Mono',Menlo,monospace" font-size="8" fill="#e2e8f0">: </text>
  <text x="706" y="250" font-family="'SF Mono',Menlo,monospace" font-size="8" fill="#34d399">600</text>
  <text x="598" y="266" font-family="'SF Mono',Menlo,monospace" font-size="8" fill="#60a5fa">  cursor</text>
  <text x="670" y="266" font-family="'SF Mono',Menlo,monospace" font-size="8" fill="#e2e8f0">: </text>
  <text x="682" y="266" font-family="'SF Mono',Menlo,monospace" font-size="8" fill="#34d399">pointer</text>
  <text x="598" y="282" font-family="'SF Mono',Menlo,monospace" font-size="8" fill="#60a5fa">  transition</text>
  <text x="686" y="282" font-family="'SF Mono',Menlo,monospace" font-size="8" fill="#e2e8f0">: </text>
  <text x="698" y="282" font-family="'SF Mono',Menlo,monospace" font-size="8" fill="#34d399">all 0.2s ease</text>
  
  <text x="582" y="302" font-family="'SF Mono',Menlo,monospace" font-size="8" fill="#94a3b8">  &amp;:hover {</text>
  <text x="598" y="318" font-family="'SF Mono',Menlo,monospace" font-size="8" fill="#60a5fa">    background</text>
  <text x="670" y="318" font-family="'SF Mono',Menlo,monospace" font-size="8" fill="#e2e8f0">: </text>
  <text x="682" y="318" font-family="'SF Mono',Menlo,monospace" font-size="8" fill="#f472b6">${"${''}"}linear-gradient(135deg, #4f46e5, #7c3aed)${"${''}"}</text>
  <text x="582" y="336" font-family="'SF Mono',Menlo,monospace" font-size="8" fill="#94a3b8">  }</text>
  <text x="582" y="352" font-family="'SF Mono',Menlo,monospace" font-size="8" fill="#94a3b8">`;</text>
  
  <text x="582" y="372" font-family="'SF Mono',Menlo,monospace" font-size="8" fill="#c084fc">export default</text>
  <text x="670" y="372" font-family="'SF Mono',Menlo,monospace" font-size="8" fill="#e2e8f0"> HeroButton;</text>
  
  <!-- Success indicator -->
  <rect x="570" y="425" width="320" height="40" fill="#065f46" rx="6" stroke="#10b981" stroke-width="1"/>
  <text x="590" y="448" font-family="system-ui,sans-serif" font-size="10" fill="#34d399" font-weight="600">✓  Code generated successfully</text>
  <text x="590" y="462" font-family="system-ui,sans-serif" font-size="8" fill="#a7f3d0">All 6 CSS properties mapped · 0 warnings · Ready to copy</text>
  
  <!-- Export footer -->
