<svg xmlns="http://www.w3.org/2000/svg" width="900" height="560" viewBox="0 0 900 560">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1e3a5f;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow1" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.12"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="560" fill="#1e293b"/>
  
  <!-- Browser chrome bar -->
  <rect y="0" width="900" height="36" fill="#cbd5e1" rx="0"/>
  <circle cx="18" cy="18" r="6" fill="#ef4444"/>
  <circle cx="32" cy="18" r="6" fill="#eab308"/>
  <circle cx="46" cy="18" r="6" fill="#22c55e"/>
  <rect x="62" y="6" width="680" height="24" fill="white" rx="4"/>
  <text x="72" y="22" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">🔒  https://example.com</text>
  
  <!-- Main layout: page content (left) + side panel (right) -->
  
  <!-- Page content (left side) -->
  <rect y="36" width="560" height="524" fill="#f8fafc"/>
  <rect x="60" y="70" width="440" height="160" fill="url(#grad1)" rx="12"/>
  <rect x="78" y="90" width="100" height="10" fill="rgba(99,102,241,0.2)" rx="5"/>
  <text x="88" y="97" font-family="system-ui,sans-serif" font-size="7" fill="#a5b4fc" font-weight="600">AI-Powered CSS Extraction</text>
  <text x="78" y="120" font-family="system-ui,sans-serif" font-size="15" fill="white" font-weight="800">Extract Any Style.</text>
  <text x="78" y="138" font-family="system-ui,sans-serif" font-size="15" fill="white" font-weight="800">Export Any Code.</text>
  <text x="78" y="157" font-family="system-ui,sans-serif" font-size="8" fill="#94a3b8">Hover → Extract → Edit → Export.</text>
  <rect x="78" y="165" width="110" height="24" fill="url(#grad2)" rx="6"/>
  <text x="90" y="180" font-family="system-ui,sans-serif" font-size="8" fill="white" font-weight="600">Get StyleSnap — $29</text>
  
  <!-- Cards below hero -->
  <rect x="60" y="250" width="200" height="80" fill="white" rx="8" filter="url(#shadow1)"/>
  <text x="76" y="272" font-family="system-ui,sans-serif" font-size="9" fill="#1e293b" font-weight="700">Pixel-Perfect Extraction</text>
  <text x="76" y="286" font-family="system-ui,sans-serif" font-size="7" fill="#64748b">Hover over any element to</text>
  <text x="76" y="296" font-family="system-ui,sans-serif" font-size="7" fill="#64748b">instantly capture styles.</text>
  <rect x="280" y="250" width="200" height="80" fill="white" rx="8" filter="url(#shadow1)"/>
  <text x="296" y="272" font-family="system-ui,sans-serif" font-size="9" fill="#1e293b" font-weight="700">AI Code Generation</text>
  <text x="296" y="286" font-family="system-ui,sans-serif" font-size="7" fill="#64748b">One click converts CSS to</text>
  <text x="296" y="296" font-family="system-ui,sans-serif" font-size="7" fill="#64748b">React, Vue, or Tailwind.</text>
  
  <!-- Side Panel (right side) - KEY VISUAL -->
  <rect x="560" y="36" width="340" height="524" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  
  <!-- Panel header -->
  <rect x="560" y="36" width="340" height="40" fill="#0f172a" stroke="#1e293b" stroke-width="0" ry="0"/>
  <text x="578" y="60" font-family="system-ui,sans-serif" font-size="11" fill="#e2e8f0" font-weight="700">⟨/⟩  StyleSnap</text>
  <rect x="770" y="45" width="8" height="8" fill="#22c55e" rx="4"/>
  <text x="782" y="52" font-family="system-ui,sans-serif" font-size="7" fill="#22c55e" font-weight="600">LIVE</text>
  
  <!-- Panel tabs -->
  <rect x="560" y="76" width="85" height="28" fill="none" stroke="#6366f1" stroke-width="0" ry="0"/>
  <text x="582" y="94" font-family="system-ui,sans-serif" font-size="9" fill="#a5b4fc" font-weight="600">CSS</text>
  <rect x="645" y="76" width="85" height="28" fill="none"/>
  <text x="660" y="94" font-family="system-ui,sans-serif" font-size="9" fill="#64748b">React</text>
  <rect x="730" y="76" width="85" height="28" fill="none"/>
  <text x="747" y="94" font-family="system-ui,sans-serif" font-size="9" fill="#64748b">Tailwind</text>
  <line x1="560" y1="104" x2="900" y2="104" stroke="#1e293b" stroke-width="1"/>
  
  <!-- Panel body: Computed Styles section -->
  <text x="578" y="122" font-family="system-ui,sans-serif" font-size="7" fill="#64748b" font-weight="600" letter-spacing="0.5">COMPUTED STYLES</text>
  <text x="578" y="139" font-family="system-ui,sans-serif" font-size="9" fill="#e2e8f0" font-weight="700">.demo-btn  (button#hero-btn)</text>
  
  <!-- Property rows -->
  <rect x="578" y="148" width="240" height="20" fill="#1e293b" rx="4"/>
  <text x="586" y="161" font-family="system-ui,sans-serif" font-size="8" fill="#94a3b8">background</text>
  <text x="700" y="161" font-family="'SF Mono',Menlo,monospace" font-size="8" fill="#a5b4fc" font-weight="600">linear-gradient(...)</text>
  
  <rect x="578" y="172" width="240" height="20" fill="#0f172a" rx="4"/>
  <text x="586" y="185" font-family="system-ui,sans-serif" font-size="8" fill="#94a3b8">color</text>
  <text x="700" y="185" font-family="'SF Mono',Menlo,monospace" font-size="8" fill="#e2e8f0">#ffffff</text>
  
  <rect x="578" y="196" width="240" height="20" fill="#1e293b" rx="4"/>
  <text x="586" y="209" font-family="system-ui,sans-serif" font-size="8" fill="#94a3b8">padding</text>
  <rect x="700" y="199" width="60" height="14" fill="rgba(99,102,241,0.15)" rx="3"/>
  <text x="706" y="209" font-family="'SF Mono',Menlo,monospace" font-size="8" fill="#6366f1" font-weight="600">10px 28px</text>
  
  <rect x="578" y="220" width="240" height="20" fill="#0f172a" rx="4"/>
  <text x="586" y="233" font-family="system-ui,sans-serif" font-size="8" fill="#94a3b8">border-radius</text>
  <text x="700" y="233" font-family="'SF Mono',Menlo,monospace" font-size="8" fill="#e2e8f0">8px</text>
  
  <rect x="578" y="244" width="240" height="20" fill="#1e293b" rx="4"/>
  <text x="586" y="257" font-family="system-ui,sans-serif" font-size="8" fill="#94a3b8">font-size</text>
  <text x="700" y="257" font-family="'SF Mono',Menlo,monospace" font-size="8" fill="#e2e8f0">0.95rem</text>
  
  <rect x="578" y="268" width="240" height="20" fill="#0f172a" rx="4"/>
  <text x="586" y="281" font-family="system-ui,sans-serif" font-size="8" fill="#94a3b8">font-weight</text>
  <rect x="700" y="273" width="44" height="14" fill="rgba(99,102,241,0.15)" rx="3"/>
  <text x="706" y="283" font-family="'SF Mono',Menlo,monospace" font-size="8" fill="#6366f1" font-weight="600">600</text>
  
  <rect x="578" y="292" width="240" height="20" fill="#1e293b" rx="4"/>
  <text x="586" y="305" font-family="system-ui,sans-serif" font-size="8" fill="#94a3b8">cursor</text>
  <text x="700" y="305" font-family="'SF Mono',Menlo,monospace" font-size="8" fill="#e2e8f0">pointer</text>
  
  <rect x="578" y="316" width="240" height="20" fill="#0f172a" rx="4"/>
  <text x="586" y="329" font-family="system-ui,sans-serif" font-size="8" fill="#94a3b8">display</text>
  <text x="700" y="329" font-family="'SF Mono',Menlo,monospace" font-size="8" fill="#e2e8f0">inline-block</text>
  
  <!-- Selector section -->
  <text x="578" y="358" font-family="system-ui,sans-serif" font-size="7" fill="#64748b" font-weight="600" letter-spacing="0.5">SELECTOR</text>
  <rect x="578" y="363" width="240" height="20" fill="#1e293b" rx="4"/>
  <text x="586" y="376" font-family="system-ui,sans-serif" font-size="8" fill="#94a3b8">best match</text>
  <rect x="700" y="367" width="70" height="14" fill="rgba(165,180,252,0.1)" rx="3"/>
  <text x="706" y="377" font-family="'SF Mono',Menlo,monospace" font-size="8" fill="#a5b4fc" font-weight="600">.demo-btn</text>
  
  <!-- Panel footer -->
  <line x1="560" y1="520" x2="900" y2="520" stroke="#1e293b" stroke-width="1"/>
  <rect x="578" y="525" width="260" height="26" fill="none"/>
  <rect x="578" y="527" width="110" height="22" fill="#6366f1" rx="6"/>
  <text x="600" y="541" font-family="system-ui,sans-serif" font-size="8" fill="white" font-weight="600">⎘  Copy CSS</text>
  <rect x="698" y="527" width="80" height="22" fill="none" stroke="#334155" stroke-width="1" rx="6"/>
  <text x="714" y="541" font-family="system-ui,sans-serif" font-size="8" fill="#a5b4fc" font-weight="600">⤢  Export</text>
  
  <!-- Step label -->
  <rect x="250" y="510" width="400" height="38" fill="#6366f1" rx="8" filter="url(#shadow1)"/>
  <circle cx="272" cy="529" r="10" fill="rgba(255,255,255,0.2)"/>
  <text x="284" y="533" font-family="system-ui,sans-serif" font-size="11" fill="white" font-weight="700">02</text>
  <text x="308" y="533" font-family="system-ui,sans-serif" font-size="11" fill="white" font-weight="700">Edit &amp; Refine — Open side panel, edit values, see changes live</text>
</svg>